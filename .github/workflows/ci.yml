name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain and QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-system-arm

      - name: Toolchain versions
        run: |
          aarch64-linux-gnu-gcc --version
          aarch64-linux-gnu-ld --version
          qemu-system-aarch64 --version

      - name: Build
        run: |
          make \
            CC=aarch64-linux-gnu-gcc \
            LD=aarch64-linux-gnu-ld \
            OBJCOPY=aarch64-linux-gnu-objcopy \
            GDB=aarch64-linux-gnu-gdb
          ls -lh kernel8.elf kernel8.img

      - name: Smoke test QEMU
        run: |
          echo "Checking raspi3b machine support:"
          qemu-system-aarch64 -machine help 2>&1 | grep -i raspi || true
          echo "Boot output (5s timeout):"
          echo "" | timeout 5 qemu-system-aarch64 \
            -machine raspi3b -kernel kernel8.img \
            -display none -nographic 2>&1 || true

      - name: Test
        run: ./tests/run_tests.sh --verbose
