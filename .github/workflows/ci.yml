name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain and QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            qemu-system-arm \
            python3

      - name: Toolchain versions
        run: |
          aarch64-linux-gnu-gcc --version
          qemu-system-aarch64 --version

      - name: Build kernel
        run: |
          make CROSS=aarch64-linux-gnu-
          ls -lh kernel8.elf kernel8.img

      - name: jam.py self-tests
        run: python3 tools/jam.py test

      - name: Forth/Nock unit tests (158 tests)
        run: bash tests/run_tests.sh

      - name: Kernel boot integration tests (5 kernels)
        run: bash tests/kernel-boot.sh --verbose
